<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="45" font-size="20" font-weight="bold" fill="#0f172a">ilxyr — research control plane</text>
  <text x="40" y="66" font-size="12" font-style="italic" fill="#475569">Fund uncertainty. Settle in evidence.</text>
  <text x="1240" y="45" font-size="11" fill="#94a3b8" text-anchor="end">ADRs 0001–0004 · docs/PROGRAM.md</text>

  <!-- ============ HUMAN POLICY LAYER ============ -->
  <rect x="40" y="85" width="1200" height="92" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="60" y="106" font-size="12" font-weight="bold" fill="#334155">HUMAN — policy layer, outside the operational loop (ADR 0003)</text>
  <rect x="60" y="116" width="340" height="48" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="230" y="136" font-size="11" fill="#334155" text-anchor="middle">Constitution — signed policy objects,</text>
  <text x="230" y="151" font-size="11" fill="#334155" text-anchor="middle">executable allowlists, ack thresholds</text>
  <rect x="420" y="116" width="300" height="48" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="570" y="136" font-size="11" fill="#334155" text-anchor="middle">Epoch budget — signed credit mint</text>
  <text x="570" y="151" font-size="11" fill="#334155" text-anchor="middle">(allocation-only credits)</text>
  <rect x="740" y="116" width="480" height="48" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="980" y="136" font-size="11" fill="#334155" text-anchor="middle">Boundary acknowledgements (new executable · open network · spend line)</text>
  <text x="980" y="151" font-size="11" fill="#334155" text-anchor="middle">+ asynchronous batched spine review</text>

  <!-- Human -> promoted lane (signs) -->
  <line x1="570" y1="164" x2="570" y2="203" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="578" y="188" font-size="10" fill="#64748b">signs</text>
  <!-- Human -> ledger (audit) -->
  <line x1="1000" y1="164" x2="1030" y2="203" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1022" y="186" font-size="10" fill="#64748b">audit · verify</text>

  <!-- ============ MODEL ACTORS ============ -->
  <rect x="40" y="205" width="230" height="310" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="155" y="228" font-size="12" font-weight="bold" fill="#4338ca" text-anchor="middle">MODEL ACTORS</text>
  <text x="155" y="243" font-size="10" fill="#6366f1" text-anchor="middle">versioned model:// handles</text>
  <rect x="60" y="255" width="190" height="44" rx="6" fill="#ffffff" stroke="#a5b4fc"/>
  <text x="155" y="273" font-size="11" fill="#312e81" text-anchor="middle">Proposer</text>
  <text x="155" y="287" font-size="10" fill="#6366f1" text-anchor="middle">one per family (v1.1)</text>
  <rect x="60" y="309" width="190" height="44" rx="6" fill="#ffffff" stroke="#a5b4fc"/>
  <text x="155" y="327" font-size="11" fill="#312e81" text-anchor="middle">Reviewer</text>
  <text x="155" y="341" font-size="10" fill="#6366f1" text-anchor="middle">math foundation · eng review</text>
  <rect x="60" y="363" width="190" height="58" rx="6" fill="#ffffff" stroke="#a5b4fc"/>
  <text x="155" y="381" font-size="11" fill="#312e81" text-anchor="middle">Forecasters × N</text>
  <text x="155" y="395" font-size="10" fill="#6366f1" text-anchor="middle">probabilities + stake,</text>
  <text x="155" y="408" font-size="10" fill="#6366f1" text-anchor="middle">close before execution</text>
  <text x="155" y="448" font-size="10" fill="#4338ca" text-anchor="middle">role separation at admission:</text>
  <text x="155" y="462" font-size="10" fill="#4338ca" text-anchor="middle">proposer ≠ reviewer,</text>
  <text x="155" y="476" font-size="10" fill="#4338ca" text-anchor="middle">proposer never forecasts</text>
  <text x="155" y="490" font-size="10" fill="#4338ca" text-anchor="middle">its own experiment</text>

  <!-- Actors -> promoted lane -->
  <line x1="270" y1="290" x2="298" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ PROMOTED LANE ============ -->
  <rect x="300" y="205" width="580" height="160" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="320" y="228" font-size="12" font-weight="bold" fill="#9a3412">PROMOTED LANE — full ceremony (slow, few)</text>
  <!-- pipeline chips -->
  <g font-size="10" text-anchor="middle" fill="#7c2d12">
    <rect x="320" y="240" width="68" height="30" rx="5" fill="#ffffff" stroke="#fdba74"/><text x="354" y="259">contribute</text>
    <rect x="396" y="240" width="68" height="30" rx="5" fill="#ffffff" stroke="#fdba74"/><text x="430" y="259">compile</text>
    <rect x="472" y="240" width="68" height="30" rx="5" fill="#ffffff" stroke="#fdba74"/><text x="506" y="259">forecast</text>
    <rect x="548" y="240" width="68" height="30" rx="5" fill="#ffffff" stroke="#fdba74"/><text x="582" y="259">fund</text>
    <rect x="624" y="240" width="68" height="30" rx="5" fill="#ffffff" stroke="#fdba74"/><text x="658" y="259">admit</text>
    <rect x="700" y="240" width="68" height="30" rx="5" fill="#ffffff" stroke="#fdba74"/><text x="734" y="259">execute</text>
    <rect x="776" y="240" width="68" height="30" rx="5" fill="#ffffff" stroke="#fdba74"/><text x="810" y="259">settle</text>
  </g>
  <g stroke="#ea580c" stroke-width="1.2">
    <line x1="388" y1="255" x2="394" y2="255" marker-end="url(#arr)"/>
    <line x1="464" y1="255" x2="470" y2="255" marker-end="url(#arr)"/>
    <line x1="540" y1="255" x2="546" y2="255" marker-end="url(#arr)"/>
    <line x1="616" y1="255" x2="622" y2="255" marker-end="url(#arr)"/>
    <line x1="692" y1="255" x2="698" y2="255" marker-end="url(#arr)"/>
    <line x1="768" y1="255" x2="774" y2="255" marker-end="url(#arr)"/>
  </g>
  <text x="320" y="296" font-size="10.5" fill="#9a3412">allocator: deterministic, ranks by resolution-weighted forecaster disagreement / credit cost</text>
  <text x="320" y="314" font-size="10.5" fill="#9a3412">admission: deterministic gates — no agent authorizes execution</text>
  <text x="320" y="332" font-size="10.5" fill="#9a3412">settlement: Brier → Murphy decomposition → calibration records</text>
  <text x="320" y="350" font-size="10.5" fill="#9a3412">frozen contract on a shared task surface · forecasts close before run</text>

  <!-- ratchet -->
  <line x1="760" y1="423" x2="760" y2="367" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrp)"/>
  <text x="590" y="390" font-size="10.5" fill="#7c3aed" text-anchor="middle">RATCHET — sandbox result beats registered baseline at exact_check /</text>
  <text x="590" y="404" font-size="10.5" fill="#7c3aed" text-anchor="middle">deterministic_replay ⇒ eligible for promotion (computed, never granted)</text>

  <!-- ============ SANDBOX LANE ============ -->
  <rect x="300" y="425" width="580" height="90" rx="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="320" y="448" font-size="12" font-weight="bold" fill="#075985">SANDBOX LANE — one call (fast, many)</text>
  <text x="320" y="468" font-size="10.5" fill="#075985">spec + run + evidence in a single recorded object — no ceremony</text>
  <text x="320" y="486" font-size="10.5" fill="#075985">constraints: allowlisted executables · policy-checked args · per-run + per-epoch caps</text>
  <text x="320" y="504" font-size="10.5" fill="#075985">carries the falsification cadence — latency bounded by training time</text>

  <!-- ============ LEDGER ============ -->
  <rect x="910" y="205" width="330" height="310" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1075" y="228" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">LEDGER — append-only, single writer</text>
  <text x="1075" y="248" font-size="10.5" fill="#166534" text-anchor="middle">sha-256 content-addressed objects · hash-chained events</text>
  <text x="1075" y="263" font-size="10.5" fill="#166534" text-anchor="middle">ilxyr verify replays every link</text>
  <rect x="930" y="275" width="290" height="42" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="1075" y="292" font-size="10.5" fill="#166534" text-anchor="middle">calibration records per handle —</text>
  <text x="1075" y="306" font-size="10.5" fill="#166534" text-anchor="middle">reliability + resolution (Murphy)</text>
  <!-- evidence stages -->
  <rect x="930" y="332" width="290" height="34" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="1075" y="353" font-size="10.5" fill="#075985" text-anchor="middle">sandbox evidence — recorded, replayable</text>
  <line x1="1075" y1="366" x2="1075" y2="376" stroke="#16a34a" stroke-width="1.4" marker-end="url(#arrg)"/>
  <rect x="930" y="378" width="290" height="34" rx="6" fill="#ffedd5" stroke="#ea580c"/>
  <text x="1075" y="399" font-size="10.5" fill="#9a3412" text-anchor="middle">promoted evidence — settled through ceremony</text>
  <line x1="1075" y1="412" x2="1075" y2="422" stroke="#16a34a" stroke-width="1.4" marker-end="url(#arrg)"/>
  <rect x="930" y="424" width="290" height="52" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1075" y="443" font-size="11" font-weight="bold" fill="#14532d" text-anchor="middle">SPINE CLAIMS</text>
  <text x="1075" y="457" font-size="10" fill="#166534" text-anchor="middle">promoted + independently replicated</text>
  <text x="1075" y="470" font-size="10" fill="#166534" text-anchor="middle">on a shared task contract</text>
  <text x="1075" y="494" font-size="10" fill="#16a34a" text-anchor="middle">evidence graph: supports · contradicts · replicates ·</text>
  <text x="1075" y="507" font-size="10" fill="#16a34a" text-anchor="middle">depends_on · supersedes · subsumes · derived_from</text>

  <!-- lanes -> ledger -->
  <line x1="880" y1="285" x2="908" y2="285" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="894" y="277" font-size="9.5" fill="#64748b" text-anchor="middle">events</text>
  <line x1="880" y1="470" x2="908" y2="440" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- calibration feedback to forecasters -->
  <path d="M 920 512 C 720 552, 430 552, 240 545 C 200 542, 170 535, 165 521" fill="none" stroke="#6366f1" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="330" y="563" font-size="10" fill="#6366f1" text-anchor="middle">resolution weights → allocator</text>

  <!-- ============ EXECUTOR ============ -->
  <rect x="470" y="556" width="340" height="52" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="640" y="577" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">LOCAL-COMMAND EXECUTOR</text>
  <text x="640" y="593" font-size="10" fill="#475569" text-anchor="middle">shell-free · absolute path · cleared env · timeout · {"metrics":{…}}</text>
  <!-- lanes -> executor -->
  <line x1="560" y1="515" x2="580" y2="554" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="740" y1="515" x2="710" y2="554" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- executor -> families -->
  <line x1="540" y1="608" x2="440" y2="648" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="740" y1="608" x2="840" y2="648" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ FAMILIES ============ -->
  <rect x="300" y="650" width="240" height="150" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="420" y="673" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">ZERO — science substrate</text>
  <text x="420" y="693" font-size="10.5" fill="#1e40af" text-anchor="middle">float micro LM · dependency-free C11</text>
  <text x="420" y="709" font-size="10.5" fill="#1e40af" text-anchor="middle">validators outside the model</text>
  <text x="420" y="725" font-size="10.5" fill="#1e40af" text-anchor="middle">fast falsification: architecture,</text>
  <text x="420" y="741" font-size="10.5" fill="#1e40af" text-anchor="middle">curriculum, faculty routing</text>
  <text x="420" y="765" font-size="10.5" font-style="italic" fill="#3b82f6" text-anchor="middle">asks: is it learnable?</text>

  <rect x="760" y="650" width="240" height="150" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="880" y="673" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">SOLOMON — deployment substrate</text>
  <text x="880" y="693" font-size="10.5" fill="#92400e" text-anchor="middle">integer-only training · Rust → CPU/WASM</text>
  <text x="880" y="709" font-size="10.5" fill="#92400e" text-anchor="middle">native-integer updates · exact replay</text>
  <text x="880" y="725" font-size="10.5" fill="#92400e" text-anchor="middle">checked numeric health · tokens-per-watt</text>
  <text x="880" y="765" font-size="10.5" font-style="italic" fill="#d97706" text-anchor="middle">asks: does it survive integers + ship?</text>

  <!-- shared task contract -->
  <rect x="558" y="666" width="184" height="118" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="650" y="688" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">SHARED TASK</text>
  <text x="650" y="702" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">CONTRACT</text>
  <text x="650" y="722" font-size="10" fill="#6d28d9" text-anchor="middle">dataset hashes · encoding</text>
  <text x="650" y="736" font-size="10" fill="#6d28d9" text-anchor="middle">metrics · eval set · verifier</text>
  <text x="650" y="750" font-size="10" fill="#6d28d9" text-anchor="middle">referenced by digest</text>
  <text x="650" y="770" font-size="9.5" font-style="italic" fill="#8b5cf6" text-anchor="middle">first: Zero q22r quantity faculty</text>
  <!-- families consume contract -->
  <line x1="540" y1="720" x2="555" y2="720" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#arrp)"/>
  <line x1="760" y1="720" x2="745" y2="720" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#arrp)"/>

  <!-- replication bridge -->
  <path d="M 480 800 C 520 840, 780 840, 820 800" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="650" y="852" font-size="10.5" font-weight="bold" fill="#334155" text-anchor="middle">ZERO → SOLOMON REPLICATION BRIDGE</text>
  <text x="650" y="866" font-size="10" fill="#64748b" text-anchor="middle">declared tolerance + per-input agreement · the spine's replication mechanism</text>

  <!-- caption -->
  <text x="40" y="880" font-size="9.5" fill="#94a3b8">solid: data flow · dashed: computed policy signals · evidence stages: sandbox → promoted → spine</text>
</svg>
